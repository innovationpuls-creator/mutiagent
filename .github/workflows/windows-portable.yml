name: Windows portable package

"on":
  push:
    branches:
      - codex/windows-portable
  workflow_dispatch:

jobs:
  package:
    runs-on: windows-2025
    env:
      LLM_API_KEY: __INJECT_LOCALLY__
      LLM_MODEL: __INJECT_LOCALLY__
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            desktop/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: python -m pip install uv==0.8.22
      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build
      - name: Build Windows backend runtime
        working-directory: backend
        run: |
          uv sync --extra desktop
          uv run pyinstaller OneTreeRuntime.spec --noconfirm --clean --distpath ../desktop/build/backend --workpath ../desktop/build/pyinstaller
      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci
      - name: Test desktop runtime
        working-directory: desktop
        run: npm test
      - name: Write embedded competition configuration
        working-directory: desktop
        run: npm run write:runtime-config
      - name: Build exact competition ZIP
        working-directory: desktop
        run: npm run pack:zip
      - name: Smoke packaged OneTree executable
        shell: pwsh
        run: |
          $smokeRoot = Join-Path $env:RUNNER_TEMP "onetree-smoke"
          $logSource = Join-Path $env:APPDATA "OneTree\logs"
          $logDestination = Join-Path $env:RUNNER_TEMP "onetree-smoke-logs"
          if (Test-Path $smokeRoot) {
            Remove-Item -Path $smokeRoot -Recurse -Force
          }
          Expand-Archive -LiteralPath "desktop/dist/11017810作品.zip" -DestinationPath $smokeRoot
          $executable = Join-Path $smokeRoot "OneTree.exe"
          $process = Start-Process -FilePath $executable -PassThru
          try {
            $ready = $false
            for ($attempt = 0; $attempt -lt 90; $attempt++) {
              if ($process.HasExited) {
                throw "OneTree.exe exited before readiness"
              }
              try {
                $response = Invoke-RestMethod -Uri "http://127.0.0.1:8000/api/health/ready" -TimeoutSec 2
                if ($response.status -eq "ok") {
                  $ready = $true
                  break
                }
              } catch {
                Start-Sleep -Seconds 2
              }
            }
            if (-not $ready) {
              throw "OneTree.exe did not become ready"
            }
            $loginBody = @{
              account = "demo@mutiagent.local"
              password = "demo123456"
            } | ConvertTo-Json
            Invoke-RestMethod -Method Post -Uri "http://127.0.0.1:8000/api/auth/login" -ContentType "application/json" -Body $loginBody | Out-Null
          } finally {
            if (-not $process.HasExited) {
              & taskkill.exe /pid $process.Id /t /f | Out-Null
            }
            Start-Sleep -Seconds 2
            if (Test-Path $logSource) {
              New-Item -ItemType Directory -Path $logDestination -Force | Out-Null
              Copy-Item -Path (Join-Path $logSource "*") -Destination $logDestination -Recurse -Force
            }
          }
      - name: Upload Windows smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: onetree-windows-smoke-logs
          path: ${{ runner.temp }}/onetree-smoke-logs
          if-no-files-found: warn
      - name: Build exact source ZIP
        shell: pwsh
        run: git archive --format=zip --output="desktop/dist/11017810源码.zip" HEAD frontend backend desktop .github/workflows/windows-portable.yml
      - name: Verify submission artifacts
        shell: pwsh
        run: |
          $work = Get-Item "desktop/dist/11017810作品.zip"
          $source = Get-Item "desktop/dist/11017810源码.zip"
          if ($work.Length -gt 1GB) { throw "11017810作品.zip exceeds 1GB" }
          if ($source.Length -gt 1GB) { throw "11017810源码.zip exceeds 1GB" }
          $verify = Join-Path $env:RUNNER_TEMP "onetree-package"
          Expand-Archive -LiteralPath $work.FullName -DestinationPath $verify
          if (-not (Test-Path (Join-Path $verify "OneTree.exe"))) {
            throw "OneTree.exe is missing from package root"
          }
          if (-not (Test-Path (Join-Path $verify "resources/backend/OneTreeRuntime.exe"))) {
            throw "OneTreeRuntime.exe is missing"
          }
          if (-not (Test-Path (Join-Path $verify "resources/runtime-config.json"))) {
            throw "runtime-config.json is missing"
          }
      - uses: actions/upload-artifact@v4
        with:
          name: 11017810-submission
          path: |
            desktop/dist/11017810作品.zip
            desktop/dist/11017810源码.zip
          if-no-files-found: error
          retention-days: 7
