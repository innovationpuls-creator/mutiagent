user nginx;
worker_processes auto;

error_log /var/log/nginx/error.log notice;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'request_id=$response_request_id request_time=$request_time';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;
    server_tokens off;
    map_hash_bucket_size 128;
    client_max_body_size 100m;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    map $http_x_request_id $request_id_header {
        default $http_x_request_id;
        "" $request_id;
    }

    map $upstream_http_x_request_id $response_request_id {
        default $upstream_http_x_request_id;
        "" $request_id_header;
    }

    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=register_limit:10m rate=5r/m;
    limit_req_status 429;

    include /etc/nginx/conf.d/*.conf;
}
