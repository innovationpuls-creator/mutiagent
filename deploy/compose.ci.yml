x-ci-app-environment: &ci-app-environment
  APP_ENV: production
  DATABASE_URL: postgresql://onetree_app:compose-test-app-password@postgres:5432/onetree
  JWT_SECRET: compose-test-jwt-secret
  LLM_BASE_URL: https://example.test/source
  LLM_API_KEY: compose-test-llm-api-key
  LLM_MODEL: compose-test-llm-model
  ALLOWED_ORIGINS: http://nginx
  KNOWLEDGE_BASE_UPLOAD_DIR: /var/lib/onetree/knowledge-base-uploads

x-ci-logging: &ci-logging
  driver: local

services:
  postgres:
    environment:
      POSTGRES_USER: onetree_maintenance
      POSTGRES_PASSWORD: compose-test-maintenance-password
      POSTGRES_DB: onetree
      POSTGRES_APP_PASSWORD: compose-test-app-password
    logging: *ci-logging

  backend:
    environment: *ci-app-environment
    logging: *ci-logging

  worker:
    environment: *ci-app-environment
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import os; os.kill(1, 0)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    logging: *ci-logging

  nginx:
    environment:
      MAINTENANCE_BYPASS_TOKEN: compose-test-maintenance-bypass
      NGINX_CONFIG_MODE: bootstrap
      PUBLIC_IPV4: 192.0.2.10
    command:
      - /bin/sh
      - -ec
      - |
        cat > /etc/nginx/conf.d/default.conf <<'NGINX'
        server {
            listen 80 default_server;
            listen [::]:80 default_server;
            server_name _;

            root /usr/share/nginx/html;
            index index.html;

            location /api {
                proxy_set_header Host $$host;
                proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $$scheme;
                proxy_set_header X-Request-ID $$request_id_header;
                proxy_pass http://backend:8000;
            }

            location / {
                try_files $$uri $$uri/ /index.html;
            }
        }
        NGINX
        rm -rf /usr/share/nginx/html/* /usr/share/nginx/html/.[!.]* /usr/share/nginx/html/..?* 2>/dev/null || true
        cp -a /opt/onetree/frontend-dist/. /usr/share/nginx/html/
        exec nginx -g 'daemon off;'
    healthcheck:
      test:
        - CMD-SHELL
        - curl --fail --silent --show-error http://127.0.0.1/api/health/ready >/dev/null
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    logging: *ci-logging

  certbot:
    profiles: ["certificates"]
    logging: *ci-logging

  migrate:
    environment: *ci-app-environment
    logging: *ci-logging

  smoke:
    entrypoint: ["python", "-c"]
    command:
      - |
        import json
        import os
        from urllib.error import HTTPError
        from urllib.request import Request, urlopen

        base_url = os.environ["BASE_URL"].rstrip("/")

        def request_json(path, *, method="GET", payload=None, headers=None):
            body = None
            request_headers = dict(headers or {})
            if payload is not None:
                body = json.dumps(payload, separators=(",", ":")).encode("utf-8")
                request_headers["Content-Type"] = "application/json"
            request = Request(
                f"{base_url}{path}",
                data=body,
                headers=request_headers,
                method=method,
            )
            with urlopen(request, timeout=15) as response:
                return response.status, json.load(response)

        status, live = request_json("/api/health/live")
        if status != 200 or live.get("status") != "ok":
            raise RuntimeError("liveness check failed")

        status, ready = request_json("/api/health/ready")
        if (
            status != 200
            or ready.get("status") != "ok"
            or ready.get("database") != "connected"
        ):
            raise RuntimeError("readiness check failed")

        with urlopen(f"{base_url}/", timeout=15) as response:
            if response.status != 200:
                raise RuntimeError("home check failed")

        fixture = {
            "username": "测试用户",
            "identifier": os.environ["SMOKE_ACCOUNT"],
            "password": os.environ["SMOKE_PASSWORD"],
            "confirm_password": os.environ["SMOKE_PASSWORD"],
            "school": "南山大学",
            "major": "软件工程",
            "class_name": "二班",
        }
        try:
            register_status, _ = request_json(
                "/api/auth/register", method="POST", payload=fixture
            )
        except HTTPError as error:
            if error.code != 409:
                raise RuntimeError("fixture registration failed") from None
            register_status = error.code
        if register_status not in (201, 409):
            raise RuntimeError("fixture registration failed")

        status, login = request_json(
            "/api/auth/login",
            method="POST",
            payload={
                "account": os.environ["SMOKE_ACCOUNT"],
                "password": os.environ["SMOKE_PASSWORD"],
            },
        )
        token = login.get("access_token")
        if status != 200 or not isinstance(token, str) or not token:
            raise RuntimeError("login check failed")

        status, current_user = request_json(
            "/api/auth/me", headers={"Authorization": f"Bearer {token}"}
        )
        if (
            status != 200
            or current_user.get("identifier") != os.environ["SMOKE_ACCOUNT"]
        ):
            raise RuntimeError("authenticated account check failed")

        print("CI smoke checks passed")
    environment:
      BASE_URL: http://nginx
      PUBLIC_IPV4: 192.0.2.10
      MAINTENANCE_BYPASS_TOKEN: compose-test-maintenance-bypass
      SMOKE_ACCOUNT: me-test@example.com
      SMOKE_PASSWORD: test-password-123
    depends_on:
      nginx:
        condition: service_healthy
    logging: *ci-logging

  backup:
    logging: *ci-logging

  restore:
    logging: *ci-logging
